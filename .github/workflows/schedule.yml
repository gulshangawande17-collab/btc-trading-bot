name: Daily Crypto Trading Bot

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  trade:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Toolboxes
        run: |
          pip install -r requirements.txt
          
      - name: Wake Up AI and Run Trading Bot
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python bot.py
